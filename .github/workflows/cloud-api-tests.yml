name: Cloud API Tests

on:
    workflow_dispatch:
    push:
        branches: [main]
        paths:
            - "cloud/api/**"
            - "cloud/worker/**"
            - "cloud/package.json"
    pull_request:
        types: [opened, reopened, ready_for_review, synchronize]
        branches: [main]
        paths:
            - "cloud/api/**"
            - "cloud/worker/**"
            - "cloud/package.json"

jobs:
    telegram-tests:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: cloud/api
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm

            - name: Run Telegram bot tests
              run: node __tests__/run-tests.js

    dashboard-build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: cloud/dashboard
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm

            - name: Build dashboard
              run: pnpm build
