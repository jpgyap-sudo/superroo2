name: Cloud API Tests

on:
    workflow_dispatch:
    push:
        branches: [main]
        paths:
            - "cloud/api/**"
            - "cloud/worker/**"
            - "cloud/package.json"
    pull_request:
        types: [opened, reopened, ready_for_review, synchronize]
        branches: [main]
        paths:
            - "cloud/api/**"
            - "cloud/worker/**"
            - "cloud/package.json"

jobs:
    telegram-tests:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: cloud/api
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm

            - name: Run Telegram custom runner tests (bot, learner, notifier, endpoints)
              run: node __tests__/run-tests.js

    telegram-vitest-tests:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: cloud
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm

            - name: Install dependencies
              run: npm install

            - name: Run Vitest tests (policy, engineer, classifier)
              run: npx vitest run

    dashboard-unit-tests:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: cloud/dashboard
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm

            - name: Run IDE terminal unit tests
              run: node src/components/ide-terminal/__tests__/run-ide-tests.js

    dashboard-build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: cloud/dashboard
        needs: [dashboard-unit-tests]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm

            - name: Build dashboard
              run: pnpm build

    dashboard-e2e:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: cloud/dashboard
        needs: [dashboard-build]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js and pnpm
              uses: ./.github/actions/setup-node-pnpm

            - name: Install Playwright browsers
              run: npx playwright install chromium

            - name: Run Playwright e2e tests
              run: npx playwright test --config=playwright.config.ts
              env:
                E2E_BASE_URL: ${{ vars.E2E_BASE_URL || 'https://dev.abcx124.xyz' }}
