name: SuperRoo PR Review

# Trigger: add the "review-this" label to any PR, or request a review.
# The action checks out the diff, runs the upgrade check, then posts
# a structured review comment via the GitHub API.
on:
  pull_request:
    types: [labeled, review_requested, opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >
      contains(github.event.pull_request.labels.*.name, 'review-this') ||
      github.event.action == 'review_requested'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.2
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: SuperRoo upgrade check
        id: upgrade_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          CENTRAL_BRAIN_URL: ${{ secrets.CENTRAL_BRAIN_URL }}
        run: node scripts/check-openhands-upgrade.mjs 2>&1 | tee /tmp/upgrade-check.txt

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            let body = '## SuperRoo PR Review\n\n'
            try {
              body += '```\n' + fs.readFileSync('/tmp/upgrade-check.txt', 'utf8') + '\n```\n'
            } catch {
              body += '_Upgrade check output not available._\n'
            }
            body += '\n> Auto-generated by SuperRoo PR Review action.'
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            })
