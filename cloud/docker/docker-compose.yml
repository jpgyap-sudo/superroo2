# SuperRoo Docker Compose — Hybrid Approach
#
# Containerized:  API, Dashboard, Mini-IDE
# Host (PM2):     Worker, Auto-Deployer, Redis
#
# Containers connect to host Redis via host.docker.internal:6379
# Container-to-container via Docker DNS (superroo-api, superroo-dashboard, superroo-mini-ide)
# nginx stays on host, proxies to localhost:8787, localhost:3001, localhost:8081
#
# Usage:
#   docker compose -f cloud/docker/docker-compose.yml up -d
#   docker compose -f cloud/docker/docker-compose.yml down
#
# Rollback:
#   docker compose -f cloud/docker/docker-compose.yml down
#   cd /opt/superroo2/cloud && pm2 start ecosystem.config.js

services:
  superroo-api:
    build:
      context: ../..
      dockerfile: cloud/docker/Dockerfile.api
    image: superroo-api:latest
    container_name: superroo-api
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=production
      - API_PORT=8787
      - REDIS_URL=redis://host.docker.internal:6379
      - SUPERROO_QUEUE_NAME=superroo-jobs
      - ORCHESTRATOR_DB_PATH=/opt/superroo2/cloud/orchestrator/data/orchestrator.db
      - ORCHESTRATOR_MODE=safe
      - ORCHESTRATOR_SELF_IMPROVE=false
      - ORCHESTRATOR_LOOP_INTERVAL=5000
      - LOGS_DIR=/opt/superroo2/cloud/logs
      - SETTINGS_DIR=/opt/superroo2/cloud/data/settings
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SUPERROO_VAULT_KEY=${SUPERROO_VAULT_KEY}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    volumes:
      - orchestrator-data:/opt/superroo2/cloud/orchestrator/data
      - hermes-data:/opt/superroo2/cloud/data
      - logs:/opt/superroo2/cloud/logs
    mem_limit: 256m
    mem_reservation: 128m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - superroo-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  superroo-dashboard:
    build:
      context: ../..
      dockerfile: cloud/docker/Dockerfile.dashboard
    image: superroo-dashboard:latest
    container_name: superroo-dashboard
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Dashboard rewrites /api/* to this URL (see next.config.js)
      - NEXT_PUBLIC_API_URL=http://superroo-api:8787
    mem_limit: 256m
    mem_reservation: 128m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - superroo-net
    depends_on:
      superroo-api:
        condition: service_healthy

  superroo-mini-ide:
    build:
      context: ../..
      dockerfile: cloud/docker/Dockerfile.mini-ide
    image: superroo-mini-ide:latest
    container_name: superroo-mini-ide
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=production
      - MINI_IDE_PORT=8081
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - CORS_ORIGIN=https://dev.abcx124.xyz
      - SUPERROO_API_URL=http://superroo-api:8787
      - SUPERROO_API_KEY=
      - WORKSPACE_ROOT=/srv/superroo/workspaces
      - UPLOAD_DIR=/opt/superroo2/cloud/mini-ide/uploads
      - SESSION_TTL_MINUTES=30
    volumes:
      - uploads:/opt/superroo2/cloud/mini-ide/uploads
      - logs:/opt/superroo2/cloud/logs
    mem_limit: 256m
    mem_reservation: 128m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - superroo-net
    depends_on:
      superroo-api:
        condition: service_healthy

volumes:
  orchestrator-data:
    name: superroo-orchestrator-data
  hermes-data:
    name: superroo-hermes-data
  uploads:
    name: superroo-uploads
  logs:
    name: superroo-logs

networks:
  superroo-net:
    name: superroo-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
