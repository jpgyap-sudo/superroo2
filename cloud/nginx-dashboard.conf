# SuperRoo Cloud Dashboard — Nginx Configuration
# HTTPS is handled by /etc/nginx/sites-enabled/dev.abcx124.xyz (Certbot-managed)
# Deploy: sudo cp cloud/nginx-dashboard.conf /etc/nginx/sites-enabled/dashboard
#         sudo nginx -t && sudo systemctl reload nginx
#
# This file is the DEFAULT server for port 80. Its only job is to redirect
# all HTTP traffic to HTTPS. All actual routing (API, static files, etc.)
# lives in the dev.abcx124.xyz site config.

server {
	listen 80 default_server;
	listen [::]:80 default_server;

	server_name _;

	# Redirect all HTTP traffic to HTTPS
	return 301 https://$host$request_uri;
}
