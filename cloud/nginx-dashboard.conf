# SuperRoo Cloud Dashboard — Nginx Configuration (HTTP-only)
# HTTPS is handled by /etc/nginx/sites-enabled/dev.abcx124.xyz (Certbot-managed)
# Deploy: sudo cp cloud/nginx-dashboard.conf /etc/nginx/sites-enabled/dashboard
#         sudo nginx -t && sudo systemctl reload nginx

server {
	listen 80;
	listen [::]:80;

	server_name _;

	# Serve Next.js static assets directly from disk
	# This avoids 400 errors from the Next.js standalone server
	location /_next/static/ {
		alias /opt/superroo2/cloud/dashboard/.next/static/;
		expires 365d;
		add_header Cache-Control "public, immutable, max-age=31536000";
		access_log off;
	}

	# Dashboard reverse proxy
	location / {
		proxy_pass http://127.0.0.1:3001;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection 'upgrade';
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_cache_bypass $http_upgrade;

		# Timeouts
		proxy_connect_timeout 60;
		proxy_send_timeout 60;
		proxy_read_timeout 60;
	}

	# API proxy
	location /api/ {
		proxy_pass http://127.0.0.1:8787/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}
