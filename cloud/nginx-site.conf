# SuperRoo Full Stack — Nginx Site Configuration
# Location: /etc/nginx/sites-enabled/dev.abcx124.xyz
# Deploy: sudo cp cloud/nginx-site.conf /etc/nginx/sites-enabled/dev.abcx124.xyz
#         sudo nginx -t && sudo systemctl reload nginx
#
# Routes:
#   /api/*        → API server (port 8787)
#   /ws           → Mini IDE WebSocket (port 8081)
#   /tg/*         → Mini IDE HTTP (port 8081)
#   /_next/*      → Next.js dashboard static (port 3001)
#   /             → Next.js dashboard (port 3001)

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name dev.abcx124.xyz;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/dev.abcx124.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.abcx124.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── API routes → API server (port 8787) ──────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # ── WebSocket → Mini IDE (port 8081) ─────────────────────────────────
    location /ws {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Mini IDE (Telegram) → Mini IDE (port 8081) ───────────────────────
    location /tg/ {
        proxy_pass http://127.0.0.1:8081/tg/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # ── Next.js Dashboard (port 3001) ────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
