<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperRoo Cloud Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: rgba(30, 30, 50, 0.9);
    border: 1px solid rgba(100, 100, 200, 0.3);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  }
  h1 {
    font-size: 24px;
    margin-bottom: 8px;
    color: #fff;
    text-align: center;
  }
  .subtitle {
    font-size: 14px;
    color: #888;
    text-align: center;
    margin-bottom: 24px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #aaa;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid rgba(100, 100, 200, 0.3);
    border-radius: 8px;
    background: rgba(20, 20, 35, 0.8);
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus {
    border-color: #6c63ff;
  }
  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #6c63ff, #5a52d5);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 12px;
    text-align: center;
    display: none;
  }
  .success {
    color: #51cf66;
    font-size: 13px;
    margin-top: 12px;
    text-align: center;
    display: none;
  }
  .loading {
    display: none;
    text-align: center;
    margin-top: 12px;
  }
  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(100, 100, 200, 0.3);
    border-top-color: #6c63ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer {
    margin-top: 20px;
    text-align: center;
    font-size: 12px;
    color: #666;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🔐 SuperRoo Cloud</h1>
  <p class="subtitle">Sign in to link your Telegram account</p>
  <div id="loginForm">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <button id="loginBtn" onclick="handleLogin()">Sign In</button>
    <div class="error" id="errorMsg"></div>
    <div class="loading" id="loading"><div class="spinner"></div></div>
  </div>
  <div id="successScreen" style="display:none; text-align:center;">
    <div style="font-size:48px; margin-bottom:16px;">✅</div>
    <h2 style="color:#51cf66; margin-bottom:8px;">Login Successful!</h2>
    <p style="color:#aaa; font-size:14px;">You can now close this page and return to Telegram.</p>
    <p style="color:#888; font-size:12px; margin-top:16px;">The bot will send you a confirmation message.</p>
  </div>
  <div class="footer">SuperRoo Cloud Dashboard</div>
</div>

<script>
// Get URL parameters
const params = new URLSearchParams(window.location.search);
const chatId = params.get('chat_id');
const telegramId = params.get('telegram_id');

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('errorMsg');
  const loadingEl = document.getElementById('loading');
  const loginBtn = document.getElementById('loginBtn');

  // Clear previous errors
  errorEl.style.display = 'none';
  errorEl.textContent = '';

  // Validate
  if (!email) { showError('Please enter your email'); return; }
  if (!password) { showError('Please enter your password'); return; }

  // Show loading
  loadingEl.style.display = 'block';
  loginBtn.disabled = true;

  try {
    const response = await fetch('/api/telegram/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: email,
        password: password,
        telegramUserId: telegramId || '',
        telegramChatId: chatId || '',
        telegramUsername: ''
      })
    });

    const data = await response.json();

    if (data.ok) {
      // Show success
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('successScreen').style.display = 'block';
    } else {
      showError(data.error || 'Login failed. Please check your credentials.');
    }
  } catch (err) {
    showError('Network error. Please try again.');
  } finally {
    loadingEl.style.display = 'none';
    loginBtn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
