version: "3.8"

# SuperRoo Repo Indexing Stack
# ──────────────────────────────
# Adds Qdrant vector DB + Ollama embeddings to the existing SuperRoo stack.
# Run alongside docker-compose.yml:
#   docker-compose -f docker-compose.yml -f docker-compose.indexing.yml up -d
#
# Or standalone for indexing-only:
#   docker-compose -f docker-compose.indexing.yml up -d

services:
  # ── Qdrant Vector Database ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: superroo-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
      - ./config/qdrant.yaml:/qdrant/config/production.yaml:ro
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - superroo-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Ollama (Local Embeddings + LLM) ─────────────────────────────────────
  ollama:
    image: ollama/ollama:0.6.2
    container_name: superroo-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - superroo-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        # Fallback: CPU-only if no GPU
        limits:
          memory: 4G

  # ── Indexer Worker ──────────────────────────────────────────────────────
  indexer-worker:
    build:
      context: ../
      dockerfile: cloud/docker/Dockerfile.indexer
    container_name: superroo-indexer
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - REPO_PATH=/repo
      - PROJECT_ID=superroo2
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - WATCHER_PORT=3418
      - DEBOUNCE_MS=2000
      - NODE_ENV=production
    volumes:
      - ../:/repo:ro
    ports:
      - "3418:3418"   # Health check endpoint
    networks:
      - superroo-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  qdrant_data:
    driver: local
  ollama_data:
    driver: local

networks:
  superroo-network:
    external: true
    name: superroo-network
