# SuperRoo Codex Configuration
# This file configures Codex to work with the SuperRoo intelligence layer

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[project]
name = "superroo2"
default_agent_flow = "codex_reads_lessons_deepseek_codes_ollama_summarizes"

# DeepSeek API Key (last 4 chars: b52d)
# Full key should be in DEEPSEEK_API_KEY environment variable

[superoo_intelligence]
read_lessons_before_task = true
write_lessons_after_task = true
ollama_summary_enabled = true
central_brain_enabled = true

[models]
planner = "codex"
coder = "deepseek"
reviewer = "codex"
memory = "ollama"
fallback_reviewer = "claude_or_kimi"

instructions = """
Read AGENTS.md before every task.

Superoo workflow:
- Codex = planner and reviewer
- DeepSeek = main coder
- Ollama = lesson summarizer and memory learner
- Central Brain = permanent lesson storage

Before coding:
1. Read memory/lessons-learned.md
2. Read memory/bugs-fixed.md
3. Read memory/model-decisions.md
4. Read docs/intelligence-layer/architecture.md (if exists)

Use the LessonRetriever to find relevant lessons:
- Query by task type (coding, debugging, testing, deployment)
- Query by file paths being modified
- Query by tags (e.g., 'error-handling', 'performance', 'security')
- Include top 5 most relevant lessons in your planning

After every task, you MUST record lessons learned:

1. Create task summary (what was accomplished)
2. List files changed
3. Identify bug cause (if applicable)
4. Explain fix applied (if applicable)
5. Record test result (pass/fail/unknown)
6. Write lesson learned (reusable insight)
7. Define reusable rule (specific actionable guidance)

Append the lesson to memory/lessons-learned.md using this format:

### Lesson: [Short descriptive title]

Date: [YYYY-MM-DD]
Source: Codex task completion
Model/API used: codex
Confidence: [high/medium/low]
Related files: [comma-separated list]

#### Task Summary
[What was being built or fixed?]

#### Files Changed
- [file1]
- [file2]

#### Bug Cause
[What caused the issue, if known?]

#### Fix Applied
[What fixed it?]

#### Test Result
[Test outcome]

#### Lesson Learned
[Reusable engineering lesson]

#### Reusable Rule
[Future agents should follow this rule]

#### Tags
[tag1, tag2, tag3]

---

Then run the lesson capture scripts if available:
- node scripts/extract-lesson-from-commit.mjs --interactive
- node scripts/ollama-summarize-lesson.mjs (when Ollama is running)
- node scripts/central-brain-store-lesson.mjs (when Central Brain is running)

Finally, update the lesson index:
- node scripts/regenerate-lesson-index.mjs (if it exists)
"""

[commands]
# Custom commands that Codex can use
read_lessons = "node -e \"const {getLessonRetriever} = require('./src/super-roo/lessons'); const retriever = getLessonRetriever(); retriever.load().then(() => retriever.getTopLessons(5)).then(lessons => console.log(JSON.stringify(lessons, null, 2)))\""
find_lessons_for_file = "node -e \"const {getLessonRetriever} = require('./src/super-roo/lessons'); const retriever = getLessonRetriever(); retriever.load().then(() => retriever.getLessonsForFile(process.argv[1], 5)).then(lessons => console.log(JSON.stringify(lessons, null, 2)))\""
find_lessons_for_task = "node -e \"const {getLessonRetriever} = require('./src/super-roo/lessons'); const retriever = getLessonRetriever(); retriever.load().then(() => retriever.getLessonsForTask(process.argv[1], 5)).then(lessons => console.log(JSON.stringify(lessons, null, 2)))\""

[integrations]
# MCP server integration
mcp_enabled = true
mcp_config_path = "mcp-superroo-config.json"

# GitHub integration
github_enabled = true
auto_create_pr = true
pr_template = ".github/pull_request_template.md"

# Git integration
git_enabled = true
auto_commit = false  # Require approval for commits
commit_template = "conventional"  # conventional commits format

[logging]
level = "info"
output_dir = "logs"
retention_days = 30

# NEW: Workflow Enforcement Configuration
[workflow_enforcement]
# Require DeepSeek for coding tasks (can warn or block)
require_deepseek_for_coding = true
# Action when DeepSeek is not used: "warn", "block", or "log_only"
violation_action = "warn"
# Require API key tracking (last 4 chars) for verification
require_api_key_tracking = true
# Require all workflow phases (planning, coding, review, summarization)
require_all_phases = true
# Require Ollama summarization after task completion
require_ollama_summary = true
# Require Central Brain storage for lessons
require_central_brain = true

# NEW: DeepSeek Delegation Configuration
[deepseek]
# Primary API key (required for coding tasks)
# Set via DEEPSEEK_API_KEY environment variable
# Current key last 4 chars: b52d
primary_api_key = "${DEEPSEEK_API_KEY}"
# Fallback API key (used if primary fails or rate-limited)
fallback_api_key = "${DEEPSEEK_API_KEY_FALLBACK}"
# Verify which key was used in commit logs
verify_key_usage = true
# Store last 4 chars of key for verification
store_key_last4 = true
# Model to use for coding tasks
model = "deepseek-chat"
# Maximum tokens per request
max_tokens = 4096
# Timeout in milliseconds
timeout_ms = 30000
# Retry attempts if API fails
retry_attempts = 2

# NEW: API Usage Tracking
[api_tracking]
# Track all API calls in real-time
enabled = true
# Storage location for usage logs
log_dir = "server/src/memory"
# Flush cache to disk after N calls
flush_after_calls = 10
# Track token usage (prompt + completion)
track_tokens = true
# Track latency for each call
track_latency = true
# Track which API key was used
track_api_keys = true
# Track fallback usage
track_fallbacks = true

# NEW: Workflow Verification Commands
[commands]
# Custom commands that Codex can use
read_lessons = "node -e \"const {getLessonRetriever} = require('./src/super-roo/lessons'); const retriever = getLessonRetriever(); retriever.load().then(() => retriever.getTopLessons(5)).then(lessons => console.log(JSON.stringify(lessons, null, 2)))\""
find_lessons_for_file = "node -e \"const {getLessonRetriever} = require('./src/super-roo/lessons'); const retriever = getLessonRetriever(); retriever.load().then(() => retriever.getLessonsForFile(process.argv[1], 5)).then(lessons => console.log(JSON.stringify(lessons, null, 2)))\""
find_lessons_for_task = "node -e \"const {getLessonRetriever} = require('./src/super-roo/lessons'); const retriever = getLessonRetriever(); retriever.load().then(() => retriever.getLessonsForTask(process.argv[1], 5)).then(lessons => console.log(JSON.stringify(lessons, null, 2)))\""
# NEW: Check workflow compliance

check_compliance = "node scripts/check-workflow-compliance.mjs"
check_compliance_since = "node scripts/check-workflow-compliance.mjs --since"
verify_api_key = "node scripts/check-workflow-compliance.mjs --verify-key"
generate_compliance_report = "node scripts/check-workflow-compliance.mjs --report"

[features]
# Enable specific SuperRoo features
lesson_extraction = true
auto_test = true
code_review = true
security_audit = true
performance_check = true
# NEW: Workflow tracking features
workflow_tracking = true
model_usage_tracking = true
deepseek_verification = true
