# SuperRoo Codex Configuration
# Codex Brain is the default local intelligence layer:
# Codex plans/reviews/applies, Codex Brain retrieves/collects/drafts/remembers.

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[project]
name = "superroo2"
default_agent_flow = "codex_brain_retrieves_collects_ollama_agents_draft_codex_reviews_remembers"
local_brain_flow = "codex_plans_codex_brain_mcp_or_cli_retrieves_ollama_agents_draft_codex_reviews_remembers"

[superoo_intelligence]
read_lessons_before_task = true
write_lessons_after_task = true
central_brain_enabled = true
codex_brain_enabled = true
append_only_lessons = true
deepseek_summary_enabled = false

[models]
planner = "codex"
coder = "codex-brain/ollama"
reviewer = "codex"
memory = "ollama"
fallback_reviewer = "claude_or_kimi"

instructions = """
Read AGENTS.md before every task.

SuperRoo Codex workflow:
- Codex = planner, editor, reviewer, and final verifier
- Codex Brain = local RAG, context collector, researcher, and Ollama coder tools
- Ollama = local embeddings and local coding/review helper models
- Central Brain = permanent lesson storage
- Lessons are append-only. Never delete, rewrite, reorder, or patch existing lesson blocks.

Before coding:
1. Run: node scripts/ml/build-agent-context.mjs "<task description>"
2. Read: memory/context/latest-agent-context.md
3. Run: node scripts/codex-brain.mjs retrieve "<task description>"
4. For substantial work run: node scripts/codex-brain.mjs collect "<task description>"

Codex Brain MCP:
- MCP-aware agents use: node scripts/codex-brain-mcp.mjs
- Tools exposed include retrieve_context, collect_context, research, analyze_task,
  code, code_pro, code_pro_verified, smart_code, code_with_memory, remember, recall,
  list_collections, brain_status, warmup, and record_outcome.
  smart_code routes automatically: heuristic picks code/code_pro/code_pro_verified.

Codex Brain CLI:
- codex_brain_retrieve <task>
- codex_brain_collect <task>
- codex_brain_code <prompt>
- codex_brain_code_pro <prompt>
- codex_brain_code_verified <prompt>
- codex_brain_code_with_memory <prompt>
- codex_brain_remember <lesson>
- codex_brain_recall <query>

Workflow:
1. PLAN: Read rules, build context, retrieve Codex Brain memory.
2. COLLECT: Use Codex Brain collect_context for substantial tasks.
3. DRAFT: Use Codex Brain code/code-pro/code-with-memory as advisory workers.
4. APPLY: Codex edits files directly and verifies.
5. RECORD: Append lesson to memory/lessons-learned.md and memory/lesson-index.jsonl.
6. SYNC: Run sync-local-extension-lessons, seed Codex Brain, and sync to Central Brain when reachable.
"""

[commands]
read_lessons = "node -e \"const {getLessonRetriever} = require('./src/super-roo/lessons'); const retriever = getLessonRetriever(); retriever.load().then(() => retriever.getTopLessons(5)).then(lessons => console.log(JSON.stringify(lessons, null, 2)))\""
find_lessons_for_file = "node -e \"const {getLessonRetriever} = require('./src/super-roo/lessons'); const retriever = getLessonRetriever(); retriever.load().then(() => retriever.getLessonsForFile(process.argv[1], 5)).then(lessons => console.log(JSON.stringify(lessons, null, 2)))\""
find_lessons_for_task = "node -e \"const {getLessonRetriever} = require('./src/super-roo/lessons'); const retriever = getLessonRetriever(); retriever.load().then(() => retriever.getLessonsForTask(process.argv[1], 5)).then(lessons => console.log(JSON.stringify(lessons, null, 2)))\""

codex_brain = "node scripts/codex-brain.mjs"
codex_brain_mcp = "node scripts/codex-brain-mcp.mjs"
codex_brain_status = "node scripts/codex-brain.mjs status"
codex_brain_retrieve = "node scripts/codex-brain.mjs retrieve"
codex_brain_collect = "node scripts/codex-brain.mjs collect"
codex_brain_code = "node scripts/codex-brain.mjs code"
codex_brain_code_pro = "node scripts/codex-brain.mjs code-pro"
codex_brain_code_verified = "node scripts/codex-brain.mjs code-verified"
codex_brain_smart_code = "node scripts/codex-brain.mjs smart"
codex_brain_code_with_memory = "node scripts/codex-brain.mjs code-with-memory"
codex_brain_remember = "node scripts/codex-brain.mjs remember"
codex_brain_recall = "node scripts/codex-brain.mjs recall"

ollama_embed = "node scripts/mcp-codex-bridge.mjs ollama embed"
ollama_chat = "node scripts/mcp-codex-bridge.mjs ollama chat"
ollama_list_models = "node scripts/mcp-codex-bridge.mjs ollama list-models"
ollama_status = "node scripts/mcp-codex-bridge.mjs ollama status"

sync_extension_lessons = "node scripts/sync-local-extension-lessons.mjs"
seed_codex_brain = "node scripts/codex-brain.mjs seed-lessons --all"
sync_central_brain = "node scripts/sync-lessons-to-central-brain.mjs"
check_append_only_lessons = "node scripts/guard-append-only-lessons.mjs"

check_compliance = "node scripts/check-workflow-compliance.mjs"
check_compliance_since = "node scripts/check-workflow-compliance.mjs --since"
generate_compliance_report = "node scripts/check-workflow-compliance.mjs --report"

[features]
lesson_extraction = true
auto_test = true
code_review = true
security_audit = true
performance_check = true
workflow_tracking = true
model_usage_tracking = true
mcp_bridge_ollama = true
codex_brain_mcp = true
deepseek_verification = false
mcp_bridge_deepseek = false
